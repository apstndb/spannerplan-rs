name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      publish_github_packages:
        description: Also publish npm tarballs to GitHub Packages (npm.pkg.github.com)
        type: boolean
        default: false

env:
  CARGO_TERM_COLOR: always

jobs:
  ffi:
    name: FFI ${{ matrix.artifact_name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            rust_target: x86_64-unknown-linux-gnu
            lib_name: libspannerplan_ffi.so
            artifact_name: spannerplan-ffi-linux-x64
          - os: macos-14
            rust_target: aarch64-apple-darwin
            lib_name: libspannerplan_ffi.dylib
            artifact_name: spannerplan-ffi-macos-arm64
          - os: macos-14
            rust_target: x86_64-apple-darwin
            lib_name: libspannerplan_ffi.dylib
            artifact_name: spannerplan-ffi-macos-x64
          - os: windows-latest
            rust_target: x86_64-pc-windows-msvc
            lib_name: spannerplan_ffi.dll
            artifact_name: spannerplan-ffi-windows-x64

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - uses: Swatinem/rust-cache@v2

      - name: Build cdylib
        run: cargo build -p spannerplan-ffi --release --target ${{ matrix.rust_target }}

      - name: Stage library
        shell: bash
        run: |
          mkdir -p "dist/${{ matrix.artifact_name }}"
          cp "target/${{ matrix.rust_target }}/release/${{ matrix.lib_name }}" \
            "dist/${{ matrix.artifact_name }}/${{ matrix.lib_name }}"
          cp crates/spannerplan-ffi/spannerplan.h "dist/${{ matrix.artifact_name }}/spannerplan.h"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/${{ matrix.artifact_name }}

  js:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Add wasm32 target
        run: rustup target add wasm32-unknown-unknown

      - uses: taiki-e/install-action@v2
        with:
          tool: wasm-pack

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: js/package-lock.json

      - name: npm ci
        working-directory: js
        run: npm ci

      - name: npm build
        working-directory: js
        run: npm run build

      - name: Pack npm tarballs
        working-directory: js
        run: |
          npm pack -w @spannerplan/core
          npm pack -w @spannerplan/cli
          mkdir -p ../dist/npm
          mv spannerplan-core-*.tgz ../dist/npm/
          mv spannerplan-cli-*.tgz ../dist/npm/

      - uses: actions/upload-artifact@v4
        with:
          name: npm-packages
          path: dist/npm

  publish-github-packages:
    needs: js
    if: >-
      startsWith(github.ref, 'refs/tags/') &&
      (github.event_name == 'workflow_dispatch' && inputs.publish_github_packages)
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: npm-packages
          path: dist/npm

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: https://npm.pkg.github.com

      - name: Publish to GitHub Packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # GitHub Packages npm requires the scope to match the repo owner.
          publish_one() {
            local src="$1" name="$2"
            local work="$(mktemp -d)"
            tar xzf "$src" -C "$work"
            node -e "
              const fs = require('node:fs');
              const path = require('node:path');
              const pkgPath = path.join(process.argv[1], 'package', 'package.json');
              const pkg = JSON.parse(fs.readFileSync(pkgPath, 'utf8'));
              pkg.name = process.argv[2];
              pkg.publishConfig = { registry: 'https://npm.pkg.github.com' };
              fs.writeFileSync(pkgPath, JSON.stringify(pkg, null, 2));
            " "$work" "$name"
            npm publish "$work/package" --access restricted
          }
          publish_one dist/npm/spannerplan-core-*.tgz "@apstndb/spannerplan-core"
          publish_one dist/npm/spannerplan-cli-*.tgz "@apstndb/spannerplan-cli"

  release:
    needs: [ffi, js]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create checksums
        run: |
          cd dist
          find . -type f \( -name '*.so' -o -name '*.dylib' -o -name '*.dll' -o -name '*.tgz' \) \
            -print0 | sort -z | xargs -0 shasum -a 256 > SHA256SUMS.txt

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          gh release delete "$TAG" -y 2>/dev/null || true
          NOTES="$(mktemp)"
          cat > "$NOTES" <<'EOF'
          ## Install

          Distribution is via **GitHub Releases** and **git dependencies** — not
          crates.io or npmjs.org. See [DISTRIBUTION.md](https://github.com/apstndb/spannerplan-rs/blob/main/DISTRIBUTION.md).

          ### Rust

          ```toml
          spannerplan = { git = "https://github.com/apstndb/spannerplan-rs", tag = "TAG" }
          ```

          ### JavaScript

          Prebuilt tarballs are attached to this release (`spannerplan-core-*.tgz`,
          `spannerplan-cli-*.tgz`):

          ```bash
          gh release download TAG --pattern 'spannerplan-core*.tgz'
          npm install ./spannerplan-core-*.tgz
          ```

          ### FFI native library

          Download the platform artifact below and set `SPANNERPLAN_FFI_LIB` or
          `SPANNERPLAN_FFI_DIR`. See [bindings/README.md](bindings/README.md).

          ### Python

          ```bash
          pip install "spannerplan @ git+https://github.com/apstndb/spannerplan-rs@TAG#subdirectory=bindings/python"
          ```
          EOF
          sed -i "s/TAG/${TAG}/g" "$NOTES"
          PRERELEASE_FLAG=""
          if [[ "$TAG" == *alpha* || "$TAG" == *beta* ]]; then
            PRERELEASE_FLAG="--prerelease"
          fi
          mapfile -t ASSETS < <(find dist -type f | sort)
          gh release create "$TAG" "${ASSETS[@]}" --title "$TAG" --notes-file "$NOTES" $PRERELEASE_FLAG

  verify-consumers:
    needs: release
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Verify Rust git dependency
        run: |
          mkdir -p /tmp/spannerplan-consumer/src
          cat > /tmp/spannerplan-consumer/Cargo.toml <<'EOF'
          [package]
          name = "consumer"
          version = "0.0.0"
          edition = "2021"

          [dependencies]
          spannerplan = { git = "https://github.com/apstndb/spannerplan-rs", tag = "${{ github.ref_name }}" }
          EOF
          cat > /tmp/spannerplan-consumer/src/main.rs <<'EOF'
          fn main() {
              let yaml = include_str!("plan.yaml");
              let nodes = spannerplan::extract::extract_plan_nodes(yaml.as_bytes()).unwrap();
              assert!(!nodes.is_empty());
          }
          EOF
          cp testdata/reference/dca.yaml /tmp/spannerplan-consumer/src/plan.yaml
          cargo run --manifest-path /tmp/spannerplan-consumer/Cargo.toml

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build FFI for binding smoke test
        run: cargo build -p spannerplan-ffi --release

      - name: Verify Python git install
        env:
          SPANNERPLAN_FFI_LIB: ${{ github.workspace }}/target/release/libspannerplan_ffi.so
        run: |
          pip install "spannerplan @ git+https://github.com/apstndb/spannerplan-rs@${{ github.ref_name }}#subdirectory=bindings/python"
          python -c "from spannerplan import render_tree_table_json; import pathlib; p=pathlib.Path('testdata/reference/dca.yaml').read_text(); out=render_tree_table_json(p,'PLAN','CURRENT'); assert 'Operator' in out"
