name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  ffi:
    name: FFI ${{ matrix.artifact_name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            rust_target: x86_64-unknown-linux-gnu
            lib_name: libspannerplan_ffi.so
            artifact_name: spannerplan-ffi-linux-x64
          - os: macos-14
            rust_target: aarch64-apple-darwin
            lib_name: libspannerplan_ffi.dylib
            artifact_name: spannerplan-ffi-macos-arm64
          - os: macos-14
            rust_target: x86_64-apple-darwin
            lib_name: libspannerplan_ffi.dylib
            artifact_name: spannerplan-ffi-macos-x64
          - os: windows-latest
            rust_target: x86_64-pc-windows-msvc
            lib_name: spannerplan_ffi.dll
            artifact_name: spannerplan-ffi-windows-x64

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - uses: Swatinem/rust-cache@v2

      - name: Build cdylib
        run: cargo build -p spannerplan-ffi --release --target ${{ matrix.rust_target }}

      - name: Stage library
        shell: bash
        run: |
          mkdir -p "dist/${{ matrix.artifact_name }}"
          cp "target/${{ matrix.rust_target }}/release/${{ matrix.lib_name }}" \
            "dist/${{ matrix.artifact_name }}/${{ matrix.lib_name }}"
          cp crates/spannerplan-ffi/spannerplan.h "dist/${{ matrix.artifact_name }}/spannerplan.h"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/${{ matrix.artifact_name }}

  js:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Add wasm32 target
        run: rustup target add wasm32-unknown-unknown

      - uses: taiki-e/install-action@v2
        with:
          tool: wasm-pack

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: js/package-lock.json

      - name: npm ci
        working-directory: js
        run: npm ci

      - name: npm build
        working-directory: js
        run: npm run build

      - name: Pack npm tarballs
        working-directory: js
        run: |
          npm pack -w @spannerplan/core
          npm pack -w @spannerplan/cli
          mkdir -p ../dist/npm
          mv spannerplan-core-*.tgz ../dist/npm/
          mv spannerplan-cli-*.tgz ../dist/npm/

      - uses: actions/upload-artifact@v4
        with:
          name: npm-packages
          path: dist/npm

  publish-crates:
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Publish spannerplan-core
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          if [ -z "$CARGO_REGISTRY_TOKEN" ]; then
            echo "CARGO_REGISTRY_TOKEN not set; skipping crates.io publish"
            exit 0
          fi
          cargo publish -p spannerplan-core --allow-dirty

      - name: Publish spannerplan
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          if [ -z "$CARGO_REGISTRY_TOKEN" ]; then
            echo "CARGO_REGISTRY_TOKEN not set; skipping crates.io publish"
            exit 0
          fi
          cargo publish -p spannerplan --allow-dirty

  publish-npm:
    needs: js
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: npm-packages
          path: dist/npm

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: https://registry.npmjs.org

      - name: Publish to npmjs.org (optional)
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "$NODE_AUTH_TOKEN" ]; then
            echo "NPM_TOKEN not set; npm tarballs are attached to the GitHub Release only"
            exit 0
          fi
          npm publish dist/npm/spannerplan-core-*.tgz --access public --tag alpha
          npm publish dist/npm/spannerplan-cli-*.tgz --access public --tag alpha

  release:
    needs: [ffi, js]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create checksums
        working-directory: dist
        run: |
          find . -type f \( -name '*.so' -o -name '*.dylib' -o -name '*.dll' -o -name '*.tgz' \) \
            -print0 | sort -z | xargs -0 shasum -a 256 > SHA256SUMS.txt

      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: |
            ## Install

            ### Rust

            ```toml
            spannerplan = "0.1.0-alpha.1"
            # or from git:
            spannerplan = { git = "https://github.com/apstndb/spannerplan-rs", tag = "v0.1.0-alpha.1" }
            ```

            ### JavaScript

            Prebuilt tarballs are attached to this release (`spannerplan-core-*.tgz`, `spannerplan-cli-*.tgz`):

            ```bash
            npm install ./spannerplan-core-0.1.0-alpha.1.tgz
            ```

            ### FFI native library

            Download the platform artifact below and set `SPANNERPLAN_FFI_LIB` or `SPANNERPLAN_FFI_DIR`.
            See [bindings/README.md](https://github.com/apstndb/spannerplan-rs/blob/main/bindings/README.md).

            ### Python

            ```bash
            pip install "spannerplan @ git+https://github.com/apstndb/spannerplan-rs@v0.1.0-alpha.1#subdirectory=bindings/python"
            ```
          files: |
            dist/**/*
            dist/SHA256SUMS.txt

  verify-consumers:
    needs: release
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Verify Rust git dependency
        run: |
          mkdir -p /tmp/spannerplan-consumer
          cat > /tmp/spannerplan-consumer/Cargo.toml <<'EOF'
          [package]
          name = "consumer"
          version = "0.0.0"
          edition = "2021"

          [dependencies]
          spannerplan = { git = "https://github.com/apstndb/spannerplan-rs", tag = "v0.1.0-alpha.1" }
          EOF
          cat > /tmp/spannerplan-consumer/src/main.rs <<'EOF'
          fn main() {
              let yaml = include_str!("plan.yaml");
              let nodes = spannerplan::extract::extract_plan_nodes(yaml.as_bytes()).unwrap();
              assert!(!nodes.is_empty());
          }
          EOF
          cp testdata/reference/dca.yaml /tmp/spannerplan-consumer/src/plan.yaml
          cargo run --manifest-path /tmp/spannerplan-consumer/Cargo.toml

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build FFI for binding smoke test
        run: cargo build -p spannerplan-ffi --release

      - name: Verify Python git install
        env:
          SPANNERPLAN_FFI_LIB: ${{ github.workspace }}/target/release/libspannerplan_ffi.so
        run: |
          pip install "spannerplan @ git+https://github.com/apstndb/spannerplan-rs@v0.1.0-alpha.1#subdirectory=bindings/python"
          python -c "from spannerplan import render_tree_table_json; import pathlib; p=pathlib.Path('testdata/reference/dca.yaml').read_text(); out=render_tree_table_json(p,'PLAN','CURRENT'); assert 'Operator' in out"
