name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  verify-version:
    name: Verify release version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Match tag to package versions
        run: bash scripts/verify-release-version.sh "${GITHUB_REF_NAME}"

  ffi:
    name: FFI ${{ matrix.rust_target }}
    needs: verify-version
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            rust_target: x86_64-unknown-linux-gnu
            lib_name: libspannerplan_ffi.so
            archive_ext: tar.gz
          - os: macos-14
            rust_target: aarch64-apple-darwin
            lib_name: libspannerplan_ffi.dylib
            archive_ext: tar.gz
          - os: macos-14
            rust_target: x86_64-apple-darwin
            lib_name: libspannerplan_ffi.dylib
            archive_ext: tar.gz
          - os: windows-latest
            rust_target: x86_64-pc-windows-msvc
            lib_name: spannerplan_ffi.dll
            archive_ext: zip

    steps:
      - uses: actions/checkout@v4

      - name: Verify stock macOS checksum selection
        if: matrix.rust_target == 'aarch64-apple-darwin'
        run: bash scripts/test-verify-release-checksums.sh shasum

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - uses: Swatinem/rust-cache@v2

      - name: Build cdylib
        run: cargo build -p spannerplan-ffi --release --target ${{ matrix.rust_target }}

      - name: Stage library
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          STAGE="$RUNNER_TEMP/spannerplan-ffi-stage"
          mkdir -p "$STAGE" dist
          cp "target/${{ matrix.rust_target }}/release/${{ matrix.lib_name }}" "$STAGE/${{ matrix.lib_name }}"
          cp crates/spannerplan-ffi/spannerplan.h "$STAGE/spannerplan.h"
          cp LICENSE "$STAGE/LICENSE"
          ARCHIVE="dist/spannerplan-ffi-${VERSION}-${{ matrix.rust_target }}.${{ matrix.archive_ext }}"
          if [[ "${{ matrix.archive_ext }}" == "zip" ]]; then
            (cd "$STAGE" && 7z a -tzip "$GITHUB_WORKSPACE/$ARCHIVE" "${{ matrix.lib_name }}" spannerplan.h LICENSE)
          else
            tar -czf "$ARCHIVE" -C "$STAGE" "${{ matrix.lib_name }}" spannerplan.h LICENSE
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: spannerplan-ffi-${{ matrix.rust_target }}
          path: dist/spannerplan-ffi-*${{ matrix.rust_target }}.${{ matrix.archive_ext }}

  js:
    needs: verify-version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Add wasm32 target
        run: rustup target add wasm32-unknown-unknown

      - uses: taiki-e/install-action@v2
        with:
          tool: wasm-pack

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: js/package-lock.json

      - name: npm ci
        working-directory: js
        run: npm ci

      - name: npm build
        working-directory: js
        run: npm run build

      - name: Pack npm tarballs
        working-directory: js
        run: |
          npm pack -w @spannerplan/core
          npm pack -w @spannerplan/cli
          mkdir -p ../dist/npm
          mv spannerplan-core-*.tgz ../dist/npm/
          mv spannerplan-cli-*.tgz ../dist/npm/

      - uses: actions/upload-artifact@v4
        with:
          name: npm-packages
          path: dist/npm

  release:
    needs: [ffi, js]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    outputs:
      release-id: ${{ steps.create-release.outputs.release-id }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Flatten release assets
        run: |
          set -euo pipefail
          find dist -mindepth 2 -type f \( -name 'spannerplan-ffi-*.tar.gz' -o -name 'spannerplan-ffi-*.zip' -o -name 'spannerplan-*.tgz' \) -print0 |
            while IFS= read -r -d '' asset; do
              mv "$asset" "dist/$(basename "$asset")"
            done

      - name: Create checksums
        run: |
          cd dist
          find . -maxdepth 1 -type f \( -name 'spannerplan-ffi-*.tar.gz' -o -name 'spannerplan-ffi-*.zip' -o -name 'spannerplan-*.tgz' \) \
            -print | sed 's#^./##' | sort | while IFS= read -r asset; do shasum -a 256 "$asset"; done > SHA256SUMS.txt

      - name: Create draft GitHub Release
        id: create-release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          EXISTING_RELEASE_IDS="$(gh api --paginate "repos/${GITHUB_REPOSITORY}/releases?per_page=100" | \
            jq -rs --arg tag "$TAG" '.[][] | select(.tag_name == $tag) | .id')"
          if [[ -n "$EXISTING_RELEASE_IDS" ]]; then
            echo "GitHub release $TAG already exists; refusing to delete/recreate it" >&2
            exit 1
          fi
          NOTES="$(mktemp)"
          cat > "$NOTES" <<'EOF'
          ## Install

          Distribution is via **GitHub Releases** and **git dependencies** — not
          crates.io or npmjs.org. See [DISTRIBUTION.md](https://github.com/apstndb/spannerplan-rs/blob/main/DISTRIBUTION.md).

          ### Rust

          ```toml
          spannerplan = { git = "https://github.com/apstndb/spannerplan-rs", tag = "TAG" }
          ```

          ### JavaScript

          Prebuilt tarballs are attached to this release (`spannerplan-core-*.tgz`,
          `spannerplan-cli-*.tgz`):

          ```bash
          gh release download TAG --repo apstndb/spannerplan-rs --pattern 'spannerplan-core*.tgz'
          npm install ./spannerplan-core-*.tgz
          ```

          ### FFI native library

          Download the versioned target-triple FFI archive for your platform,
          extract it, and set `SPANNERPLAN_FFI_LIB` or `SPANNERPLAN_FFI_DIR`.
          See [bindings/README.md](bindings/README.md).

          ### Python

          ```bash
          pip install "spannerplan @ git+https://github.com/apstndb/spannerplan-rs@TAG#subdirectory=bindings/python"
          ```
          EOF
          sed -i "s/TAG/${TAG}/g" "$NOTES"
          PRERELEASE_FLAG=""
          if [[ "$TAG" == *alpha* || "$TAG" == *beta* ]]; then
            PRERELEASE_FLAG="--prerelease"
          fi
          mapfile -t ASSETS < <(find dist -type f | sort)
          gh release create "$TAG" "${ASSETS[@]}" --title "$TAG" --notes-file "$NOTES" \
            --draft $PRERELEASE_FLAG
          RELEASE_ID="$(gh api --paginate "repos/${GITHUB_REPOSITORY}/releases?per_page=100" | \
            jq -rs --arg tag "$TAG" '.[][] | select(.tag_name == $tag) | .id')"
          if [[ "$(printf '%s\n' "$RELEASE_ID" | sed '/^$/d' | wc -l | tr -d ' ')" != "1" ]]; then
            echo "expected exactly one GitHub Release for $TAG" >&2
            exit 1
          fi
          echo "release-id=$RELEASE_ID" >> "$GITHUB_OUTPUT"

  verify-consumers:
    needs: release
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Verify Rust git dependency
        run: |
          mkdir -p /tmp/spannerplan-consumer/src
          cat > /tmp/spannerplan-consumer/Cargo.toml <<'EOF'
          [package]
          name = "consumer"
          version = "0.0.0"
          edition = "2021"

          [dependencies]
          spannerplan = { git = "https://github.com/apstndb/spannerplan-rs", tag = "${{ github.ref_name }}" }
          EOF
          cat > /tmp/spannerplan-consumer/src/main.rs <<'EOF'
          fn main() {
              let yaml = include_str!("plan.yaml");
              let nodes = spannerplan::extract::extract_plan_nodes(yaml.as_bytes()).unwrap();
              assert!(!nodes.is_empty());
          }
          EOF
          cp testdata/reference/dca.yaml /tmp/spannerplan-consumer/src/plan.yaml
          cargo run --manifest-path /tmp/spannerplan-consumer/Cargo.toml

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: js/package-lock.json

      - name: Download and verify draft assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          mkdir -p "$RUNNER_TEMP/release-assets"
          bash scripts/download-release-assets.sh \
            --repo "${GITHUB_REPOSITORY}" \
            --release-id "${{ needs.release.outputs.release-id }}" \
            --dir "$RUNNER_TEMP/release-assets" \
            SHA256SUMS.txt \
            "spannerplan-ffi-${VERSION}-x86_64-unknown-linux-gnu.tar.gz" \
            "spannerplan-ffi-${VERSION}-aarch64-apple-darwin.tar.gz" \
            "spannerplan-ffi-${VERSION}-x86_64-apple-darwin.tar.gz" \
            "spannerplan-ffi-${VERSION}-x86_64-pc-windows-msvc.zip" \
            "spannerplan-core-${VERSION}.tgz" \
            "spannerplan-cli-${VERSION}.tgz"
          (cd "$RUNNER_TEMP/release-assets" && sha256sum -c SHA256SUMS.txt)
          mkdir -p "$RUNNER_TEMP/release-assets/ffi"
          tar -xzf "$RUNNER_TEMP/release-assets/spannerplan-ffi-${VERSION}-x86_64-unknown-linux-gnu.tar.gz" \
            -C "$RUNNER_TEMP/release-assets/ffi"
          test -s "$RUNNER_TEMP/release-assets/ffi/libspannerplan_ffi.so"

      - name: Verify Python git install with draft FFI archive
        env:
          SPANNERPLAN_FFI_LIB: ${{ runner.temp }}/release-assets/ffi/libspannerplan_ffi.so
        run: |
          pip install "spannerplan @ git+https://github.com/apstndb/spannerplan-rs@${{ github.ref_name }}#subdirectory=bindings/python"
          python -c "from spannerplan import render_tree_table_json; import pathlib; p=pathlib.Path('testdata/reference/dca.yaml').read_text(); out=render_tree_table_json(p,'PLAN','CURRENT'); assert 'Operator' in out"

      - name: npm ci
        working-directory: js
        run: npm ci

      - name: Verify draft npm packages and browser API
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          SPANNERPLAN_CORE_TARBALL="$RUNNER_TEMP/release-assets/spannerplan-core-${VERSION}.tgz" \
          SPANNERPLAN_CLI_TARBALL="$RUNNER_TEMP/release-assets/spannerplan-cli-${VERSION}.tgz" \
          bash js/scripts/verify-release-js-tarballs.sh
