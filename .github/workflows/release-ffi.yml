name: Release FFI

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: ${{ matrix.artifact_name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            rust_target: x86_64-unknown-linux-gnu
            lib_name: libspannerplan_ffi.so
            artifact_name: spannerplan-ffi-linux-x64
          - os: macos-14
            rust_target: aarch64-apple-darwin
            lib_name: libspannerplan_ffi.dylib
            artifact_name: spannerplan-ffi-macos-arm64
          - os: macos-14
            rust_target: x86_64-apple-darwin
            lib_name: libspannerplan_ffi.dylib
            artifact_name: spannerplan-ffi-macos-x64
          - os: windows-latest
            rust_target: x86_64-pc-windows-msvc
            lib_name: spannerplan_ffi.dll
            artifact_name: spannerplan-ffi-windows-x64

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - uses: Swatinem/rust-cache@v2

      - name: Build cdylib
        run: cargo build -p spannerplan-ffi --release --target ${{ matrix.rust_target }}

      - name: Stage library
        shell: bash
        run: |
          mkdir -p dist
          cp "target/${{ matrix.rust_target }}/release/${{ matrix.lib_name }}" "dist/${{ matrix.lib_name }}"
          cp crates/spannerplan-ffi/spannerplan.h dist/spannerplan.h

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            dist/${{ matrix.lib_name }}
            dist/spannerplan.h

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: dist/**/*
