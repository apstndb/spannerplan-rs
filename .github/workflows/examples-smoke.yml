name: Auxiliary tooling and client examples

on:
  push:
    branches: [main]
    paths:
      - "examples/spanner-client/**"
      - "lab/genstructuredgolden/**"
      - ".github/workflows/examples-smoke.yml"
  pull_request:
    paths:
      - "examples/spanner-client/**"
      - "lab/genstructuredgolden/**"
      - ".github/workflows/examples-smoke.yml"
  schedule:
    - cron: "37 8 * * 1"
  workflow_dispatch:

jobs:
  go:
    runs-on: ubuntu-latest
    continue-on-error: ${{ github.event_name == 'schedule' }}
    defaults:
      run:
        working-directory: examples/spanner-client/go
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: examples/spanner-client/go/go.mod
          cache-dependency-path: examples/spanner-client/go/go.sum

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

  rust:
    runs-on: ubuntu-latest
    continue-on-error: ${{ github.event_name == 'schedule' }}
    defaults:
      run:
        working-directory: examples/spanner-client/rust
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: examples/spanner-client/rust -> target

      - name: Check
        run: cargo check --locked

      - name: Compile tests
        run: cargo test --no-run --locked

  node:
    runs-on: ubuntu-latest
    continue-on-error: ${{ github.event_name == 'schedule' }}
    defaults:
      run:
        working-directory: examples/spanner-client/node
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: examples/spanner-client/node/package-lock.json

      - name: Install locked dependencies
        run: npm ci --ignore-scripts

      - name: Check JavaScript syntax
        run: |
          for file in *.mjs; do
            node --check "$file"
          done

  structured-golden:
    runs-on: ubuntu-latest
    continue-on-error: ${{ github.event_name == 'schedule' }}
    defaults:
      run:
        working-directory: lab/genstructuredgolden
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: lab/genstructuredgolden/go.mod
          cache-dependency-path: lab/genstructuredgolden/go.sum

      - name: Test
        run: go test ./...

      - name: Verify structured goldens
        run: go run . -repo-root ../.. -check
